<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO 50+ MEGA HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --purple: #bc13fe; --dark: #000; }
        body, html { margin: 0; padding: 0; background: var(--dark); font-family: 'Cairo', sans-serif; overflow-x: hidden; color: white; scroll-behavior: smooth; }

        .video-bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden; }
        .video-bg { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.2) contrast(1.3); }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.9)); }

        header { padding: 25px; text-align: center; border-bottom: 3px solid var(--neon); background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; }
        header h1 { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; margin: 0; background: linear-gradient(90deg, #fff, var(--neon), var(--purple), #fff); background-size: 200%; animation: glow 5s linear infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* شريط البحث الرايق */
        #searchBar {
            margin-top: 15px; padding: 10px 20px; width: 80%; max-width: 400px;
            background: rgba(255,255,255,0.1); border: 1px solid var(--neon);
            border-radius: 50px; color: white; text-align: center; font-family: 'Cairo'; outline: none;
        }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 30px; max-width: 1500px; margin: 0 auto; }

        .game-card { background: rgba(255, 255, 255, 0.04); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; transition: 0.3s; text-decoration: none; color: white; display: block; backdrop-filter: blur(5px); }
        .game-card:hover { transform: translateY(-8px); border-color: var(--neon); box-shadow: 0 0 20px rgba(0, 243, 255, 0.4); background: rgba(255, 255, 255, 0.08); }
        .game-card img { width: 100%; height: 120px; object-fit: cover; }

        .game-info { padding: 10px; text-align: center; }
        .game-info span { font-size: 0.85rem; font-weight: bold; display: block; height: 32px; overflow: hidden; }
        
        .play-btn { padding: 4px 12px; background: linear-gradient(45deg, var(--neon), var(--purple)); color: white; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }

        @keyframes glow { to { background-position: 200%; } }
        footer { text-align: center; padding: 20px; color: #333; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="video-bg-container">

    const grid = document.getElementById('gameGrid');
    
    function render(data) {
        grid.innerHTML = '';
        data.forEach(g => {
            const card = document.createElement('a');
            card.className = 'game-card';
            card.href = `https://www.miniplay.com/embed/${g.t.toLowerCase().replace(/ /g, "-")}`;
            card.target = "_blank";
            card.innerHTML = `
                <img src="https://img.gamedistribution.com/${g.id}-512x512.jpeg" onerror="this.src='https://via.placeholder.com/512/000/00f3ff?text=${g.t}'">
                <div class="game-info">
                    <span>${g.t}</span>
                    <div class="play-btn">LAUNCH ⚡</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function filterGames() {
        const term = document.getElementById('searchBar').value.toLowerCase();
        const filtered = games.filter(g => g.t.toLowerCase().includes(term));
        render(filtered);
    }

    render(games);
