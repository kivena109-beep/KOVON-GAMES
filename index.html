<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO GAMES HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Black+Ops+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f3ff;
            --purple: #bc13fe;
            --bg: #0a0a0c;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(135deg, #121212, #000);
            padding: 30px;
            text-align: center;
            border-bottom: 3px solid var(--neon);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        header h1 {
            font-family: 'Black Ops One', system-ui;
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, var(--neon), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .game-card {
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.4s;
            position: relative;
        }

        .game-card:hover {
            transform: scale(1.05);
            border-color: var(--neon);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.2);
        }

        iframe {
            width: 100%;
            height: 400px;
            border: none;
            background: #000;
        }

        .game-info {
            padding: 15px;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-title {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .play-now {
            background: var(--neon);
            color: black;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #555;
        }
    </style>
</head>
<body>

<header>
    <h1>KIVENIOO HUB</h1>
    <p>أفضل ألعاب الويب بجرافيكس عالي - العب الآن</p>
</header>

<div class="container">

    <div class="game-card">
        <iframe src="https://games.poki.com/en/g/rally-champion" allowfullscreen></iframe>
        <div class="game-info">
            <span class="game-title">Rally Champion (3D)</span>
            <span class="play-now">العب</span>
        </div>
    </div>

    <div class="game-card">
        <iframe src="https://www.retrogames.cc/embed/10042-tekken-3.html" allowfullscreen></iframe>
        <div class="game-info">
            <span class="game-title">Tekken 3</span>
            <span class="play-now">قتال</span>
        </div>
    </div>

    <div class="game-card">
        <iframe src="https://www.retrogames.cc/embed/19323-sonic-the-hedgehog-usa-europe.html" allowfullscreen></iframe>
        <div class="game-info">
            <span class="game-title">Sonic Adventures</span>
            <span class="play-now">سرعة</span>
        </div>
    </div>

    <div class="game-card">
        <iframe src="https://games.poki.com/en/g/soccer-skills-world-cup" allowfullscreen></iframe>
        <div class="game-info">
            <span class="game-title">Soccer World Cup</span>
            <span class="play-now">كرة قدم</span>
        </div>
    </div>

    <div class="game-card">
        <iframe src="https://www.retrogames.cc/embed/7473-metal-slug-super-vehicle-001.html" allowfullscreen></iframe>
        <div class="game-info">
            <span class="game-title">Metal Slug</span>
            <span class="play-now">أكشن</span>
        </div>
    </div>

    <div class="game-card">
        <iframe src="https://games.poki.com/en/g/subway-surfers" allowfullscreen></iframe>
        <div class="game-info">
            <span class="game-title">Subway Surfers</span>
            <span class="play-now">مغامرة</span>
        </div>
    </div>

</div>

<footer>
    <p>جميع الحقوق محفوظة لقناة kivenioo © 2026</p>
</footer>

</body>
</html>
