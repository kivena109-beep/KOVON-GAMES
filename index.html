<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO LITE HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f3ff;
            --bg: #0a0a0a;
            --card: #151515;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* هيدر الموقع */
        header {
            background: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--neon);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            font-size: 2.2rem;
            color: var(--neon);
            text-shadow: 0 0 10px var(--neon);
        }

        header p {
            font-size: 0.8rem;
            color: #888;
            margin: 5px 0 0;
        }

        /* حاوية الألعاب */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* كارت اللعبة */
        .game-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon);
            box-shadow: 0 5px 15px rgba(0, 243, 255, 0.3);
        }

        .game-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: #222;
        }

        .game-info {
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            background: #111;
            color: #eee;
        }

        /* مشغل الألعاب (السينما) */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
            flex-direction: column;
        }

        .overlay.active {
            display: flex;
        }

        .overlay-nav {
            height: 50px;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid var(--neon);
        }

        .close-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: bold;
        }

        iframe {
            flex-grow: 1;
            width: 100%;
            border: none;
            background: #000;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #444;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<header>
    <h1>KIVENIOO HUB</h1>
    <p>ألعاب 2D سريعة للإنترنت الضعيف</p>
</header>

<div class="container">
    
    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/6c906663f77b4d13b482270929f6974b/')">
        <img src="https://img.gamedistribution.com/6c906663f77b4d13b482270929f6974b-512x512.jpeg">
        <div class="game-info">قتال النينجا</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/131713d07e1570776b00511f5d6f194c/')">
        <img src="https://img.gamedistribution.com/131713d07e1570776b00511f5d6f194c-512x512.jpeg">
        <div class="game-info">Moto X3M</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/d69e4f16599b45629c158580556e438c/')">
        <img src="https://img.gamedistribution.com/d69e4f16599b45629c158580556e438c-512x512.jpeg">
        <div class="game-info">صائد الزومبي</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/d7f1d439b1a044238e8e7a03007f3f1e/')">
        <img src="https://img.gamedistribution.com/d7f1d439b1a044238e8e7a03007f3f1e-512x512.jpeg">
        <div class="game-info">سباق سيارات</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/f182c12574e44431945116743956485d/')">
        <img src="https://img.gamedistribution.com/f182c12574e44431945116743956485d-512x512.jpeg">
        <div class="game-info">كرة سلة</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/3965561085024469956461947e444319/')">
        <img src="https://img.gamedistribution.com/3965561085024469956461947e444319-512x512.jpeg">
        <div class="game-info">حرب طائرات</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/f92087640f0c436688755b4869894371/')">
        <img src="https://img.gamedistribution.com/f92087640f0c436688755b4869894371-512x512.jpeg">
        <div class="game-info">هروب (صب واي)</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/f2700ca7256149ef9fa67916964259b3/')">
        <img src="https://img.gamedistribution.com/f2700ca7256149ef9fa67916964259b3-512x512.jpeg">
        <div class="game-info">مهارات الكرة</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/390974b77f972b9a7c369e9a4d33a696/')">
        <img src="https://img.gamedistribution.com/390974b77f972b9a7c369e9a4d33a696-512x512.jpeg">
        <div class="game-info">رماية الأسهم</div>
    </div>

    <div class="game-card" onclick="openGame('https://www.retrogames.cc/embed/16847-super-mario-world-usa.html')">
        <img src="https://i.pinimg.com/originals/f3/04/80/f30480a4f5b399d2822472d8291f09c6.jpg">
        <div class="game-info">سوبر ماريو</div>
    </div>

    <div class="game-card" onclick="openGame('https://www.retrogames.cc/embed/10123-battle-city-japan.html')">
        <img src="https://i.ytimg.com/vi/bX2Vp2v9l8M/maxresdefault.jpg">
        <div class="game-info">لعبة الدبابات</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/3966099b244d4766be336a11e8f237f8/')">
        <img src="https://img.gamedistribution.com/3966099b244d4766be336a11e8f237f8-512x512.jpeg">
        <div class="game-info">قناص المدينة</div>
    </div>

</div>

<div class="overlay" id="overlay">
    <div class="overlay-nav">
        <span style="color: var(--neon); font-size: 0.9rem;">KIVENIOO MODE: ON</span>
        <button class="close-btn" onclick="closeGame()">إغلاق X</button>
    </div>
    <iframe id="gameIframe" src="" allowfullscreen></iframe>
</div>

<footer>
    <p>تم التصميم لـ Kivenioo © 2026</p>
</footer>

<script>
    const overlay = document.getElementById('overlay');
    const iframe = document.getElementById('gameIframe');

    function openGame(url) {
        overlay.classList.add('active');
        iframe.src = url;
        document.body.style.overflow = 'hidden'; // لمنع تحرك الصفحة الخلفية
    }

    function closeGame() {
        overlay.classList.remove('active');
        iframe.src = ''; // لإيقاف الصوت واللعبة فوراً
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
