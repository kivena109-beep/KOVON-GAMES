<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO ULTRA 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --purple: #bc13fe; }
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Cairo', sans-serif; overflow-x: hidden; color: white; }
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; object-fit: cover; filter: brightness(0.3) blur(2px); }
        .overlay-dark { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%); z-index: -1; }
        header { padding: 25px; text-align: center; border-bottom: 3px solid var(--neon); background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; }
        header h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin: 0; background: linear-gradient(90deg, var(--neon), var(--purple), var(--neon)); background-size: 200%; animation: glow 3s linear infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes glow { to { background-position: 200%; } }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 30px; max-width: 1400px; margin: 0 auto; }
        .game-card { background: rgba(255,255,255,0.05); border-radius: 15px; overflow: hidden; border: 1px solid rgba(0,243,243,0.2); cursor: pointer; transition: 0.3s; text-decoration: none; color: white; display: block; position: relative; }
        .game-card:hover { transform: scale(1.05); border-color: var(--neon); box-shadow: 0 0 20px var(--neon); }
        .game-card img { width: 100%; height: 150px; object-fit: cover; }
        .game-info { padding: 12px; text-align: center; font-weight: bold; background: rgba(0,0,0,0.8); }
        .play-btn { margin-top: 8px; display: inline-block; padding: 4px 12px; background: var(--neon); color: black; border-radius: 4px; font-size: 0.75rem; }
    </style>
</head>
<body>

<video class="video-bg" autoplay loop muted playsinline>
    <source src="https://v.ftcdn.net/05/56/15/45/700_F_556154562_AsLdZtZf1D6CgGv9p0AAmf8m9K0ZpW6m_ST.mp4" type="video/mp4">
</video>
<div class="overlay-dark"></div>

<header>
    <h1>KIVENIOO HUB</h1>
    <p style="color: var(--neon); margin-top: 5px;">3D GAMES | STABLE VERSION</p>
</header>

<div class="container" id="gameGrid"></div>

<script>
    // روابط ألعاب 3D مضمونة وتفتح فوراً
    const games = [
        {title: "Combat Online", url: "https://www.miniplay.com/embed/combat-online"},
        {title: "Madalin Cars 2", url: "https://www.miniplay.com/embed/madalin-stunt-cars-2"},
        {title: "Moto X3M 3D", url: "https://www.miniplay.com/embed/moto-x3m-spooky-land"},
        {title: "Sniper 3D", url: "https://www.miniplay.com/embed/sniper-clash-3d"},
        {title: "Shell Shockers", url: "https://www.miniplay.com/embed/shell-shockers"},
        {title: "Subway Surfers", url: "https://www.miniplay.com/embed/subway-surfers"},
        {title: "Drift Hunters", url: "https://www.miniplay.com/embed/drift-hunters"},
        {title: "Venge.io", url: "https://www.miniplay.com/embed/venge-io"},
        {title: "Bullet Force", url: "https://www.miniplay.com/embed/bullet-force"},
        {title: "EvoWars.io", url: "https://www.miniplay.com/embed/evowars-io"}
    ];

    const grid = document.getElementById('gameGrid');
    games.forEach(g => {
        const card = document.createElement('a');
        card.className = 'game-card';
        card.href = g.url;
        card.target = "_blank";
        
        card.innerHTML = `
            <img src="https://img.vxdn.net/c/600x338/https://static.miniplay.com/bnd/i/img/game-thumb.jpg" style="filter: hue-rotate(180deg);">
            <div class="game-info">
                ${g.title} <br>
                <span class="play-btn">إلعب الآن 🚀</span>
            </div>
        `;
        grid.appendChild(card);
    });
</script>

</body>
</html>
