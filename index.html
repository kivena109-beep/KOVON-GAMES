<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO FAST GAMES</title>
    <style>
        /* تصميم خفيف جداً للنت الضعيف */
        body { background: #111; color: #eee; font-family: sans-serif; margin: 0; text-align: center; }
        header { padding: 15px; background: #000; border-bottom: 2px solid #00f3ff; }
        h1 { margin: 0; font-size: 1.8rem; color: #00f3ff; }
        
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 15px; }
        
        /* كروت صغيرة وسريعة التحميل */
        .game-card { background: #222; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #333; }
        .game-card img { width: 100%; height: 120px; object-fit: cover; background: #333; }
        .game-info { padding: 8px; font-size: 0.8rem; font-weight: bold; }

        /* مشغل الألعاب (سريع وبسيط) */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99; flex-direction: column; }
        .overlay.active { display: flex; }
        .nav { height: 45px; background: #222; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .close-btn { background: #ff4d4d; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

<header>
    <h1>KIVENIOO LITE</h1>
    <p style="font-size: 0.7rem; color: #888; margin: 5px 0 0;">ألعاب سريعة للنت الضعيف</p>
</header>

<div class="container">
    
    <div class="game-card" onclick="openGame('https://www.retrogames.cc/embed/16847-super-mario-world-usa.html')">
        <img src="https://assets.nintendo.com/image/upload/ar_16:9,c_lpad,w_1240/bcom/en_US/games/switch/s/super-mario-world-nintendo-switch-online/hero" alt="Mario">
        <div class="game-info">سوبر ماريو</div>
    </div>

    <div class="game-card" onclick="openGame('https://www.retrogames.cc/embed/10123-battle-city-japan.html')">
        <img src="https://i.ytimg.com/vi/bX2Vp2v9l8M/maxresdefault.jpg" alt="Tanks">
        <div class="game-info">لعبة الدبابات</div>
    </div>

    <div class="game-card" onclick="openGame('https://www.retrogames.cc/embed/19323-sonic-the-hedgehog-usa-europe.html')">
        <img src="https://images.tomsguide.com/m/5103444053647360/original/Sonic-the-Hedgehog.jpg" alt="Sonic">
        <div class="game-info">سونيك</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/3965561085024469956461947e444319/')">
        <img src="https://img.gamedistribution.com/3965561085024469956461947e444319-512x512.jpeg" alt="Plane">
        <div class="game-info">حرب الطائرات</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/390974b77f972b9a7c369e9a4d33a696/')">
        <img src="https://img.gamedistribution.com/390974b77f972b9a7c369e9a4d33a696-512x512.jpeg" alt="Archer">
        <div class="game-info">صائد الأسهم</div>
    </div>

</div>

<div class="overlay" id="overlay">
    <div class="nav">
        <span style="color: #00f3ff; font-size: 0.9rem;">جاري تشغيل اللعبة...</span>
        <button class="close-btn" onclick="closeGame()">إغلاق X</button>
    </div>
    <iframe id="gameIframe" src=""></iframe>
</div>

<script>
    function openGame(url) {
        document.getElementById('overlay').classList.add('active');
        document.getElementById('gameIframe').src = url;
    }
    function closeGame() {
        document.getElementById('overlay').classList.remove('active');
        document.getElementById('gameIframe').src = '';
    }
</script>

</body>
</html>
