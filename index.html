<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO ULTIMATE GAMING</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f3ff;
            --purple: #bc13fe;
            --bg: #020202;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* خلفية سينمائية متحركة */
        .hero {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://wallpaperaccess.com/full/416684.jpg');
            background-size: cover;
            background-position: center;
            border-bottom: 2px solid var(--neon);
            text-align: center;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            margin: 0;
            background: linear-gradient(to right, var(--neon), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--neon));
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* كارت اللعبة الفخم */
        .game-card {
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        .game-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            transition: 0.3s;
        }

        .game-card:hover img {
            filter: brightness(1.2);
        }

        .game-info {
            padding: 15px;
            text-align: center;
            background: #111;
        }

        .game-title {
            font-weight: bold;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 5px;
        }

        /* نافذة اللعبة ملء الشاشة (The Cinema) */
        .game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
        }

        .game-overlay.active {
            display: flex;
            flex-direction: column;
        }

        .overlay-header {
            height: 50px;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--neon);
        }

        .close-btn {
            background: red;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        iframe {
            flex-grow: 1;
            width: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="hero">
    <h1>KIVENIOO HUB</h1>
    <p style="color: var(--neon);">ألعاب HD 3D - تجربة سينمائية كاملة</p>
</div>

<div class="container">
    
    <div class="game-card" onclick="openGame('https://games.poki.com/en/g/combat-online')">
        <img src="https://img.gamedistribution.com/3966099b244d4766be336a11e8f237f8-512x512.jpeg" alt="Combat Online">
        <div class="game-info">
            <span class="game-title">Combat Online (3D)</span>
            <small style="color: #666;">أكشن وضرب نار</small>
        </div>
    </div>

    <div class="game-card" onclick="openGame('https://games.poki.com/en/g/venge-io')">
        <img src="https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/a4/0f/5c/a40f5cca-0096-7c9e-5e26-2a83151f1f9e/AppIcon-0-0-1x_U007emarketing-0-5-0-85-220.png/1200x630wa.png" alt="Venge.io">
        <div class="game-info">
            <span class="game-title">Venge.io (FPS)</span>
            <small style="color: #666;">شبه Deadshot تماماً</small>
        </div>
    </div>

    <div class="game-card" onclick="openGame('https://games.poki.com/en/g/rally-champion')">
        <img src="https://img.poki.com/65306660-6397-4b71-b0e6-993d0f0c055c.png" alt="Rally">
        <div class="game-info">
            <span class="game-title">Rally Champion</span>
            <small style="color: #666;">سباق سيارات واقعي</small>
        </div>
    </div>

    <div class="game-card" onclick="openGame('https://games.poki.com/en/g/subway-surfers')">
        <img src="https://img.poki.com/8321683935267a840e53a39e388f6a9e.png" alt="Subway">
        <div class="game-info">
            <span class="game-title">Subway Surfers</span>
            <small style="color: #666;">مغامرة وسرعة</small>
        </div>
    </div>

    <div class="game-card" onclick="openGame('https://games.poki.com/en/g/narrow-one')">
        <img src="https://img.poki.com/974b77f972b9a7c369e9a4d33a696232.png" alt="Narrow">
        <div class="game-info">
            <span class="game-title">Narrow.One</span>
            <small style="color: #666;">قتال بالأسهم 3D</small>
        </div>
    </div>

    <div class="game-card" onclick="openGame('https://games.poki.com/en/g/moto-x3m')">
        <img src="https://img.poki.com/131713d07e1570776b00511f5d6f194c.png" alt="Moto">
        <div class="game-info">
            <span class="game-title">Moto X3M</span>
            <small style="color: #666;">سباق موتوسيكلات</small>
        </div>
    </div>

</div>

<div class="game-overlay" id="gameOverlay">
    <div class="overlay-header">
        <span id="currentTitle" style="font-weight: bold; color: var(--neon);">جاري التحميل...</span>
        <button class="close-btn" onclick="closeGame()">إغلاق اللعبة X</button>
    </div>
    <iframe id="gameIframe" src=""></iframe>
</div>

<script>
    function openGame(url) {
        const overlay = document.getElementById('gameOverlay');
        const iframe = document.getElementById('gameIframe');
        
        overlay.classList.add('active');
        iframe.src = url;
        
        // إخفاء الـ scroll بتاع الصفحة الأساسية
        document.body.style.overflow = 'hidden';
    }

    function closeGame() {
        const overlay = document.getElementById('gameOverlay');
        const iframe = document.getElementById('gameIframe');
        
        overlay.classList.remove('active');
        iframe.src = ''; // إيقاف اللعبة والصوت
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
