<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO PRO GAMES</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --purple: #ff00ff; --dark: #080808; }
        body { background: var(--dark); color: white; font-family: 'Cairo', sans-serif; margin: 0; }
        
        /* الهيدر الاحترافي */
        header { padding: 20px; text-align: center; background: #000; border-bottom: 2px solid var(--purple); box-shadow: 0 0 20px rgba(255, 0, 255, 0.2); }
        header h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin: 0; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 30px; }

        /* كروت الألعاب بتصميم Poki */
        .game-card { background: #151515; border-radius: 15px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .game-card:hover { transform: scale(1.05); border-color: var(--purple); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .game-card img { width: 100%; height: 160px; object-fit: cover; }
        .game-info { padding: 12px; text-align: center; background: #1a1a1a; font-weight: bold; font-size: 0.9rem; }

        /* مشغل الألعاب العملاق */
        .game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; }
        .game-overlay.active { display: flex; }
        .overlay-nav { height: 50px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--purple); }
        .close-btn { background: #ff4757; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; }
        iframe { flex-grow: 1; width: 100%; border: none; }
    </style>
</head>
<body>

<header>
    <h1>KIVENIOO GAMES</h1>
    <p style="font-size: 0.9rem; color: #888;">منصة الألعاب الأولى لعام 2026</p>
</header>

<div class="container">
    
    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/6c906663f77b4d13b482270929f6974b/')">
        <img src="https://img.gamedistribution.com/6c906663f77b4d13b482270929f6974b-512x512.jpeg" alt="Action">
        <div class="game-info">قتال شوارع 3D</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/131713d07e1570776b00511f5d6f194c/')">
        <img src="https://img.gamedistribution.com/131713d07e1570776b00511f5d6f194c-512x512.jpeg" alt="Moto">
        <div class="game-info">Moto X3M (سباق)</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/f92087640f0c436688755b4869894371/')">
        <img src="https://img.gamedistribution.com/f92087640f0c436688755b4869894371-512x512.jpeg" alt="Run">
        <div class="game-info">مغامرات الهروب HD</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/d69e4f16599b45629c158580556e438c/')">
        <img src="https://img.gamedistribution.com/d69e4f16599b45629c158580556e438c-512x512.jpeg" alt="Zombie">
        <div class="game-info">Zombies Shooter (أكشن)</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/f182c12574e44431945116743956485d/')">
        <img src="https://img.gamedistribution.com/f182c12574e44431945116743956485d-512x512.jpeg" alt="Basketball">
        <div class="game-info">كرة سلة المحترفين</div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/d7f1d439b1a044238e8e7a03007f3f1e/')">
        <img src="https://img.gamedistribution.com/d7f1d439b1a044238e8e7a03007f3f1e-512x512.jpeg" alt="Drift">
        <div class="game-info">Drift Cars (تفحيط)</div>
    </div>

</div>

<div class="game-overlay" id="gameOverlay">
    <div class="overlay-nav">
        <span style="color: var(--neon); font-family: 'Orbitron';">KIVENIOO GAMING...</span>
        <button class="close-btn" onclick="closeGame()">العودة للموقع X</button>
    </div>
    <iframe id="gameIframe" src="" allowfullscreen allow="autoplay; fullscreen; keyboard"></iframe>
</div>

<script>
    function openGame(url) {
        document.getElementById('gameOverlay').classList.add('active');
        document.getElementById('gameIframe').src = url;
        document.body.style.overflow = 'hidden';
    }
    function closeGame() {
        document.getElementById('gameOverlay').classList.remove('active');
        document.getElementById('gameIframe').src = '';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
