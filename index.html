<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIVENIOO MINECRAFT EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --purple: #bc13fe; --bg: #000; --card-bg: rgba(255,255,255,0.07); --text: #fff; }
        body.light-mode { --bg: #f8f9fa; --card-bg: #ffffff; --text: #1a1a1a; --neon: #007bff; }
        
        body, html { margin: 0; padding: 0; width: 100%; background: var(--bg); font-family: 'Cairo', sans-serif; transition: 0.3s; color: var(--text); overflow-x: hidden; }

        .video-bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .video-bg { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.2); }
        @media (max-width: 768px) { .video-bg-container { display: none; } body { background: #05050a; } }

        header { padding: 15px; text-align: center; border-bottom: 3px solid var(--neon); background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; }
        body.light-mode header { background: #fff; border-bottom-color: #ddd; }

        .controls { display: flex; justify-content: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        #searchBar { padding: 10px 15px; width: 180px; border-radius: 50px; border: 2px solid var(--neon); background: var(--card-bg); color: var(--text); font-size: 14px; outline: none; }
        .mode-toggle { padding: 8px 15px; border-radius: 50px; border: 2px solid var(--neon); background: transparent; color: var(--text); cursor: pointer; font-size: 12px; font-weight: bold; }

        .section-title { padding: 15px 20px 0; font-size: 1.2rem; color: var(--neon); display: none; }
        
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 20px; max-width: 1400px; margin: 0 auto; }

        .game-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; transition: 0.3s; text-decoration: none; color: inherit; display: flex; flex-direction: column; }
        .game-card:hover { transform: translateY(-8px); border-color: var(--neon); box-shadow: 0 5px 15px var(--neon); }
        
        .game-card img { width: 100%; height: 100px; object-fit: cover; }
        
        .fav-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; color: white; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .fav-btn.active { color: #ff4757; }

        .game-info { padding: 8px; text-align: center; flex-grow: 1; }
        .game-info span { font-size: 13px; font-weight: bold; display: block; margin-bottom: 8px; }
        
        .play-btn { padding: 6px; background: linear-gradient(45deg, #4caf50, #2e7d32); color: white; border-radius: 8px; font-size: 11px; font-weight: bold; }
        .play-btn.neon { background: linear-gradient(45deg, var(--neon), var(--purple)); }

        @media (min-width: 768px) {
            .container { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
            .game-card img { height: 130px; }
        }
    </style>
</head>
<body>

<div class="video-bg-container">
    <video class="video-bg" autoplay loop muted playsinline>
        <source src="https://v.ftcdn.net/05/56/15/45/700_F_556154562_AsLdZtZf1D6CgGv9p0AAmf8m9K0ZpW6m_ST.mp4" type="video/mp4">
    </video>
</div>

<header>
    <h1 style="font-family:'Orbitron'; font-size: 1.5rem; color: var(--neon); margin:0;">KIVENIOO HUB</h1>
    <div class="controls">
        <input type="text" id="searchBar" placeholder="ابحث..." onkeyup="filterGames()">
        <button class="mode-toggle" onclick="toggleMode()">🌓 Mode</button>
    </div>
</header>

<h2 id="favTitle" class="section-title">⭐ المفضلة</h2>
<div class="container" id="favGrid"></div>

<h2 class="section-title" style="display:block">🎮 ألعاب مختارة</h2>
<div class="container" id="gameGrid"></div>

<script>
    const games = [
        // ماين كرافت في الأول بتميز خاص
        {t: "Minecraft Classic", id: "f92087640f0c436688755b4869894372", special: true},
        {t: "Subway Surfers", id: "f92087640f0c436688755b4869894371"},
        {t: "Combat Online", id: "3966099b244d4766be336a11e8f237f8"},
        {t: "Madalin Cars 2", id: "83424194091e4889899147746eb0639d"},
        {t: "Sniper Clash", id: "d69e4f16599b45629c158580556e438c"},
        {t: "Drift Hunters", id: "d7f1d439b1a044238e8e7a03007f3f1e"},
        {t: "Moto X3M", id: "131713d07e1570776b00511f5d6f194c"},
        {t: "Penalty Shooters", id: "b3f07a760f0c436688755b4869894371"},
        {t: "Among Us", id: "68779956461947e44431955610850245"},
        {t: "Basketball Stars", id: "f182c12574e44431945116743956485d"},
        {t: "Stickman Hook", id: "7c9e5e262a83151f1f9ea40f5cca0096"},
        {t: "Temple Run 2", id: "1085024469956461947e444319"},
        {t: "Venge.io", id: "f1a1d439b1a044238e8e7a03007f3f1e"},
        {t: "Shell Shockers", id: "f73756d9532d43108f9c158580556e43"},
        {t: "Fruit Ninja", id: "3966099b244d4766be336a11e8f237f1"},
        {t: "Zombie Road", id: "d69e4f16599b45629c158580556e438e"},
        {t: "Tank Stars", id: "f1a1d439b1a044238e8e7a03007f3f1b"},
        {t: "Pool 8 Ball", id: "b3f07a760f0c436688755b4869894375"},
        {t: "Helix Jump", id: "d7f1d439b1a044238e8e7a03007f3f12"},
        {t: "Flappy Bird", id: "f1a1d439b1a044238e8e7a03007f3f1c"},
        {t: "Doodle Jump", id: "02443965561085024469956461947e48"},
        {t: "Paper.io 2", id: "131713d07e1570776b00511f5d6f194d"},
        {t: "Hole.io", id: "f1a1d439b1a044238e8e7a03007f3f1a"},
        {t: "Slither.io", id: "d7f1d439b1a044238e8e7a03007f3f1f"},
        {t: "Ludo Hero", id: "7c9e5e262a83151f1f9ea40f5cca0098"},
        {t: "Mario 64", id: "68779956461947e44431955610850246"},
        {t: "Fireboy Watergirl", id: "3966099b244d4766be336a11e8f237f2"},
        {t: "Bullet Force", id: "02443965561085024469956461947e44"},
        {t: "Rocket Clash", id: "3966099b244d4766be336a11e8f237f9"},
        {t: "Sky Riders", id: "f2700ca7256149ef9fa67916964259b3"}
        // ... (باقي الـ 50 لعبة بنفس النمط)
    ];

    let favorites = JSON.parse(localStorage.getItem('kivenioo-favs')) || [];
    function toggleMode() { document.body.classList.toggle('light-mode'); }
    function toggleFav(title, e) {
        e.preventDefault();
        const i = favorites.indexOf(title);
        if(i > -1) favorites.splice(i,1); else favorites.push(title);
        localStorage.setItem('kivenioo-favs', JSON.stringify(favorites));
        render();
    }

    function render(f = "") {
        const gGrid = document.getElementById('gameGrid'), fGrid = document.getElementById('favGrid'), fTitle = document.getElementById('favTitle');
        gGrid.innerHTML = ''; fGrid.innerHTML = '';

        games.forEach(g => {
            if(!g.t.toLowerCase().includes(f.toLowerCase())) return;
            const isF = favorites.includes(g.t);
            const cardHTML = `
                <div class="game-card">
                    <button class="fav-btn ${isF?'active':''}" onclick="toggleFav('${g.t}',event)">❤️</button>
                    <a href="https://www.miniplay.com/game/${g.t.toLowerCase().replace(/ /g,"-")}" target="_blank" style="text-decoration:none;color:inherit">
                        <img src="https://img.gamedistribution.com/${g.id}-512x512.jpeg">
                        <div class="game-info">
                            <span>${g.t}</span>
                            <div class="play-btn ${g.special?'':'neon'}">BUILD & PLAY ⛏️</div>
                        </div>
                    </a>
                </div>`;
            gGrid.insertAdjacentHTML('beforeend', cardHTML);
            if(isF) fGrid.insertAdjacentHTML('beforeend', cardHTML);
        });
        fTitle.style.display = favorites.length > 0 ? 'block' : 'none';
    }

    function filterGames() { render(document.getElementById('searchBar').value); }
    render();
</script>
</body>
</html>
