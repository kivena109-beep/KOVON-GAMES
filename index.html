<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO ELITE | منصة الألعاب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --purple: #bc13fe; --dark: #020202; }
        
        body, html { margin: 0; padding: 0; background: var(--dark); color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        /* خلفية جيمنج متحركة (ليزر نيون) */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(45deg, #050505, #0a0a0a, #050505);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            padding: 25px; text-align: center; background: rgba(0,0,0,0.85);
            border-bottom: 3px solid var(--neon); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin: 0;
            background: linear-gradient(90deg, var(--neon), var(--purple), var(--neon));
            background-size: 200%; animation: shine 3s linear infinite;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        @keyframes shine { to { background-position: 200%; } }

        .container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 20px; padding: 30px; max-width: 1400px; margin: 0 auto;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05); border-radius: 18px; overflow: hidden;
            border: 1px solid rgba(0, 243, 255, 0.1); cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .game-card:hover {
            transform: scale(1.07); border-color: var(--neon);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.3);
        }

        .game-card img { width: 100%; height: 140px; object-fit: cover; }

        .game-info {
            padding: 12px; text-align: center; font-weight: bold; font-size: 0.9rem;
            background: rgba(0,0,0,0.7); color: #fff;
        }

        /* واجهة اللعب (نظام السينما) */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; flex-direction: column;
        }
        .overlay.active { display: flex; }

        .nav-bar {
            height: 60px; background: #111; display: flex; justify-content: space-between;
            align-items: center; padding: 0 20px; border-bottom: 2px solid var(--purple);
        }

        .close-btn {
            background: linear-gradient(45deg, #ff4757, #ff6b81); color: white;
            border: none; padding: 8px 20px; border-radius: 10px; cursor: pointer;
            font-family: 'Cairo'; font-weight: bold; box-shadow: 0 0 15px rgba(255, 71, 87, 0.4);
        }

        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; }

        /* علامة التحميل */
        .loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; border: 5px solid #222; border-top-color: var(--neon);
            border-radius: 50%; animation: spin 1s infinite linear; z-index: -1;
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    </style>
</head>
<body>

<div class="bg-animate"></div>

<header>
    <h1>KIVENIOO ELITE</h1>
    <p style="color: var(--neon); margin: 5px 0 0; font-size: 0.8rem; letter-spacing: 2px;">GAMING REVOLUTION 2026</p>
</header>

<div class="container" id="gamesGrid">
    </div>

<div class="overlay" id="overlay">
    <div class="nav-bar">
        <span style="color: var(--neon); font-family: 'Orbitron';">KIVENIOO PLAYER V1.0</span>
        <button class="close-btn" onclick="closeGame()">خروج X</button>
    </div>
    <div class="loader"></div>
    <iframe id="gameIframe" src="" allowfullscreen allow="autoplay; fullscreen; keyboard"></iframe>
</div>

<script>
    // قائمة بـ 30 لعبة فشيخة (مختارة عشان تشتغل على نت المدرسة)
    const games = [

        {title: "Madalin Stunt 2", id: "83424194091e4889899147746eb0639d"},
        {title: "Moto X3M (Race)", id: "131713d07e1570776b00511f5d6f194c"},
        {title: "Subway Runners", id: "f92087640f0c436688755b4869894371"},

        {title: "Sniper Clash 3D", id: "d69e4f16599b45629c158580556e438c"},
        {title: "Drift King", id: "d7f1d439b1a044238e8e7a03007f3f1e"},
        {title: "Ninja Action", id: "6c906663f77b4d13b482270929f6974b"},

        {title: "Stickman Parkour", id: "390974b77f972b9a7c369e9a4d33a696"},
        {title: "Zombie Shooter", id: "b3f07a760f0c436688755b4869894371"},
        {title: "Penalty Rivals", id: "7c9e5e262a83151f1f9ea40f5cca0096"},

        {title: "Moto Road Rash", id: "131713d07e1570776b00511f5d6f194c"},

        {title: "Drift Hunter", id: "d7f1d439b1a044238e8e7a03007f3f1e"}
    ];

    const grid = document.getElementById('gamesGrid');
    
    games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.onclick = () => {
            document.getElementById('overlay').classList.add('active');
            document.getElementById('gameIframe').src = `https://html5.gamedistribution.com/${game.id}/`;
            document.body.style.overflow = 'hidden';
        };
        card.innerHTML = `
            <img src="https://img.gamedistribution.com/${game.id}-512x512.jpeg" loading="lazy">
            <div class="game-info">${game.title}</div>
        `;
        grid.appendChild(card);
    });

    function closeGame() {
        document.getElementById('overlay').classList.remove('active');
        document.getElementById('gameIframe').src = '';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
