<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --purple: #bc13fe; --bg: #000; --card-bg: rgba(255,255,255,0.05); --text: #fff; }
        body.light-mode { --bg: #f8f9fa; --card-bg: #ffffff; --text: #1a1a1a; --neon: #007bff; }
        body, html { margin: 0; padding: 0; background: var(--bg); font-family: 'Cairo', sans-serif; transition: 0.3s; color: var(--text); overflow-x: hidden; }
        .video-bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .video-bg { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.2); }
        body.light-mode .video-bg-container { display: none; }
        header { padding: 20px; text-align: center; border-bottom: 3px solid var(--neon); background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; }
        body.light-mode header { background: #fff; border-bottom-color: #ddd; }
        .controls { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        #searchBar { padding: 8px 15px; width: 200px; border-radius: 50px; border: 1px solid var(--neon); background: var(--card-bg); color: var(--text); outline: none; }
        .mode-toggle { padding: 8px 15px; border-radius: 50px; border: 1px solid var(--neon); background: transparent; color: var(--text); cursor: pointer; font-size: 0.8rem; }
        .section-title { padding: 20px 40px 0; font-size: 1.4rem; color: var(--neon); display: none; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 25px; max-width: 1400px; margin: 0 auto; }
        .game-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; transition: 0.3s; text-decoration: none; color: inherit; }
        .game-card:hover { transform: translateY(-8px); border-color: var(--neon); box-shadow: 0 5px 15px var(--neon); }
        .game-card img { width: 100%; height: 110px; object-fit: cover; }
        .fav-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; color: white; z-index: 5; }
        .fav-btn.active { color: #ff4757; }
        .game-info { padding: 10px; text-align: center; }
        .game-info span { font-size: 0.8rem; font-weight: bold; display: block; height: 30px; overflow: hidden; margin-bottom: 5px; }
        .play-btn { padding: 4px 10px; background: linear-gradient(45deg, var(--neon), var(--purple)); color: white; border-radius: 4px; font-size: 0.6rem; font-weight: bold; }
    </style>
</head>
<body>
<div class="video-bg-container"><video class="video-bg" autoplay loop muted playsinline><source src="https://v.ftcdn.net/05/56/15/45/700_F_556154562_AsLdZtZf1D6CgGv9p0AAmf8m9K0ZpW6m_ST.mp4" type="video/mp4"></video></div>
<header>

        <button class="mode-toggle" onclick="toggleMode()">🌓 Mode</button>
    </div>

    ];
    let favorites = JSON.parse(localStorage.getItem('kivenioo-favs')) || [];
    function toggleMode() { document.body.classList.toggle('light-mode'); }
    function toggleFav(title, e) {
        e.preventDefault(); const i = favorites.indexOf(title);
        if(i > -1) favorites.splice(i,1); else favorites.push(title);
        localStorage.setItem('kivenioo-favs', JSON.stringify(favorites)); render();
    }
    function render(f = "") {
        const gGrid = document.getElementById('gameGrid'), fGrid = document.getElementById('favGrid'), fTitle = document.getElementById('favTitle');
        gGrid.innerHTML = ''; fGrid.innerHTML = '';
        games.forEach(g => {
            if(!g.t.toLowerCase().includes(f.toLowerCase())) return;
            const isF = favorites.includes(g.t);
            const h = `<div class="game-card"><button class="fav-btn ${isF?'active':''}" onclick="toggleFav('${g.t}',event)">❤️</button>
                <a href="https://www.miniplay.com/embed/${g.t.toLowerCase().replace(/ /g,"-")}" target="_blank" style="text-decoration:none;color:inherit">
                <img src="https://img.gamedistribution.com/${g.id}-512x512.jpeg" onerror="this.src='https://via.placeholder.com/150/000/00f3ff?text=${g.t}'">
                <div class="game-info"><span>${g.t}</span><div class="play-btn">لعب ⚡</div></div></a></div>`;
            gGrid.insertAdjacentHTML('beforeend', h); if(isF) fGrid.insertAdjacentHTML('beforeend', h);
        });
        fTitle.style.display = favorites.length > 0 ? 'block' : 'none';
    }
    function filterGames() { render(document.getElementById('searchBar').value); }
    render();
</script>

</html>
