<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIVENIOO ULTIMATE HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --purple: #bc13fe; --bg: #000; --card-bg: rgba(255,255,255,0.07); --text: #fff; }
        body.light-mode { --bg: #f8f9fa; --card-bg: #ffffff; --text: #1a1a1a; --neon: #007bff; }
        
        body, html { margin: 0; padding: 0; width: 100%; background: var(--bg); font-family: 'Cairo', sans-serif; transition: 0.3s; color: var(--text); overflow-x: hidden; touch-action: manipulation; }

        /* فيديو الخلفية - هيختفي في الموبايل عشان السرعة */
        .video-bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .video-bg { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.2); }
        @media (max-width: 768px) { .video-bg-container { display: none; } body { background: #05050a; } }

        header { padding: 15px; text-align: center; border-bottom: 3px solid var(--neon); background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; }
        body.light-mode header { background: #fff; border-bottom-color: #ddd; }

        .controls { display: flex; justify-content: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        #searchBar { padding: 10px 15px; width: 180px; border-radius: 50px; border: 2px solid var(--neon); background: var(--card-bg); color: var(--text); font-size: 14px; outline: none; }
        .mode-toggle { padding: 8px 15px; border-radius: 50px; border: 2px solid var(--neon); background: transparent; color: var(--text); cursor: pointer; font-size: 12px; font-weight: bold; }

        .section-title { padding: 15px 20px 0; font-size: 1.2rem; color: var(--neon); display: none; }
        
        /* شبكة الألعاب - متجاوبة 100% */
        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; padding: 20px; max-width: 1400px; margin: 0 auto; 
        }

        .game-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; transition: 0.3s; text-decoration: none; color: inherit; display: flex; flex-direction: column; }
        .game-card:active { transform: scale(0.95); } /* تأثير الضغط للموبايل */
        
        .game-card img { width: 100%; height: 100px; object-fit: cover; pointer-events: none; }
        
        .fav-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; color: white; z-index: 10; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .fav-btn.active { color: #ff4757; }

        .game-info { padding: 8px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .game-info span { font-size: 13px; font-weight: bold; display: block; margin-bottom: 8px; line-height: 1.2; }
        
        .play-btn { padding: 6px; background: linear-gradient(45deg, var(--neon), var(--purple)); color: white; border-radius: 8px; font-size: 11px; font-weight: bold; text-transform: uppercase; }

        @media (min-width: 768px) {
            .container { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
            .game-card img { height: 130px; }
            .game-info span { font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="video-bg-container">
    <video class="video-bg" autoplay loop muted playsinline>
        <source src="https://v.ftcdn.net/05/56/15/45/700_F_556154562_AsLdZtZf1D6CgGv9p0AAmf8m9K0ZpW6m_ST.mp4" type="video/mp4">
    </video>
</div>

<header>
    <h1 style="font-family:'Orbitron'; font-size: 1.5rem; color: var(--neon); margin:0; letter-spacing: 2px;">KIVENIOO HUB</h1>
    <div class="controls">
        <input type="text" id="searchBar" placeholder="بحث عن لعبة..." onkeyup="filterGames()">
        <button class="mode-toggle" onclick="toggleMode()">🌓 Mode</button>
    </div>
</header>

<h2 id="favTitle" class="section-title">⭐ المفضلة</h2>
<div class="container" id="favGrid"></div>

<h2 class="section-title" style="display:block">🎮 ألعاب 3D</h2>
<div class="container" id="gameGrid"></div>

        {t: "Snow Rider 3D", id: "f182c12574e44431945116743956485f"}
    ];

    let favorites = JSON.parse(localStorage.getItem('kivenioo-favs')) || [];

    function toggleMode() { document.body.classList.toggle('light-mode'); }

    function toggleFav(title, e) {
        e.preventDefault();
        const i = favorites.indexOf(title);
        if(i > -1) favorites.splice(i,1); else favorites.push(title);
        localStorage.setItem('kivenioo-favs', JSON.stringify(favorites));
        render();
    }

    function render(f = "") {
        const gGrid = document.getElementById('gameGrid'), fGrid = document.getElementById('favGrid'), fTitle = document.getElementById('favTitle');
        gGrid.innerHTML = ''; fGrid.innerHTML = '';

        games.forEach(g => {
            if(!g.t.toLowerCase().includes(f.toLowerCase())) return;
            const isF = favorites.includes(g.t);
            const cardHTML = `
                <div class="game-card">
                    <button class="fav-btn ${isF?'active':''}" onclick="toggleFav('${g.t}',event)">❤️</button>
                    <a href="https://www.miniplay.com/game/${g.t.toLowerCase().replace(/ /g,"-")}" target="_blank" style="text-decoration:none;color:inherit">
                        <img src="https://img.gamedistribution.com/${g.id}-512x512.jpeg" onerror="this.src='https://via.placeholder.com/150/000/00f3ff?text=${g.t}'">
                        <div class="game-info">
                            <span>${g.t}</span>
                            <div class="play-btn">PLAY NOW ⚡</div>
                        </div>
                    </a>
                </div>`;
            gGrid.insertAdjacentHTML('beforeend', cardHTML);
            if(isF) fGrid.insertAdjacentHTML('beforeend', cardHTML);
        });
        fTitle.style.display = favorites.length > 0 ? 'block' : 'none';
    }

    function filterGames() { render(document.getElementById('searchBar').value); }
    render();
</script>
</body>
</html>
