        .card-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 12px; display: block; height: 25px; overflow: hidden; }

        .fav-heart { position: absolute; top: 10px; left: 10px; font-size: 1.3rem; cursor: pointer; z-index: 10; transition: 0.3s; }
        .fav-heart.active { color: #ff0055; }

            const isFav = favorites.includes(g.name);
            return `
            <div class="card">
                <div class="fav-heart ${isFav?'active':''}" onclick="toggleFav('${g.n}', this)">${isFav?'❤️':'🤍'}</div>

                    <a href="${g.l}" target="_blank" class="btn-play">العب الآن 🔥</a>
                </div>
            </div>`;
        }).join('');
    }

    function toggleFav(name, el) {
        const i = favorites.indexOf(name);
        if (i > -1) favorites.splice(i, 1); else favorites.push(name);
        localStorage.setItem('kivenioo-favs', JSON.stringify(favorites));
        render();
    }

    function search() {
        const val = document.getElementById('search').value.toLowerCase();
        const filtered = games.filter(g => g.n.toLowerCase().includes(val));
        render(filtered);
    }
