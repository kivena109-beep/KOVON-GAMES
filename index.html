<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO ULTRA 3D | HOME EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --purple: #bc13fe; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Cairo', sans-serif; overflow-x: hidden; color: white; }

        /* خلفية الفيديو السينمائية الفخمة */
        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            object-fit: cover; filter: brightness(0.4) blur(2px);
        }

        .overlay-dark {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        header {
            padding: 30px; text-align: center; border-bottom: 3px solid var(--neon);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif; font-size: clamp(1.8rem, 5vw, 3rem); margin: 0;
            background: linear-gradient(90deg, var(--neon), var(--purple), var(--neon));
            background-size: 200%; animation: glow 3s linear infinite;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--neon));
        }

        @keyframes glow { to { background-position: 200%; } }

        .container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px; padding: 40px; max-width: 1400px; margin: 0 auto;
        }

        .game-card {
            background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(0,243,243,0.2); cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px); position: relative;
            text-decoration: none; color: white; display: block;
        }

        .game-card:hover {
            transform: scale(1.1) rotate(1deg); border-color: var(--neon);
            box-shadow: 0 0 40px rgba(0,243,255,0.5);
        }

        .game-card img { width: 100%; height: 150px; object-fit: cover; }
        
        .badge {
            position: absolute; top: 10px; left: 10px; background: var(--purple);
            font-size: 10px; padding: 2px 8px; border-radius: 4px; font-family: 'Orbitron';
        }

        .game-info {
            padding: 15px; text-align: center; font-weight: bold;
            background: rgba(0,0,0,0.8); border-top: 1px solid var(--neon);
        }

        /* زر "إلعب الآن" لضمان تفاعل المستخدم وتشغيل اللعبة */
        .play-btn {
            margin-top: 10px; display: inline-block; padding: 5px 15px;
            background: var(--neon); color: black; border-radius: 5px; font-size: 0.8rem;
            transition: 0.2s;
        }
        .game-card:hover .play-btn {
            background: white;
            box-shadow: 0 0 10px white;
        }

        footer { text-align: center; padding: 20px; color: #555; font-size: 0.8rem; position: relative; z-index: 10; }
    </style>
</head>
<body>

<video class="video-bg" autoplay loop muted playsinline>
    <source src="https://v.ftcdn.net/05/56/15/45/700_F_556154562_AsLdZtZf1D6CgGv9p0AAmf8m9K0ZpW6m_ST.mp4" type="video/mp4">
</video>
<div class="overlay-dark"></div>

<header>
    <h1>KIVENIOO HOME HUB</h1>
    <p style="color: var(--neon); letter-spacing: 5px; margin: 5px 0 0;">3D GAMING REVOLUTION</p>
</header>

<div class="container" id="gameGrid">
    </div>

<footer>
    Designed for KIVENIOO | 2026
</footer>

<script>
    // قائمة الألعاب - اخترت لك روابط سريعة ومباشرة جداً لتشغيل الـ 3D
    const games = [
        {title: "Combat Online", id: "3966099b244d4766be336a11e8f237f8"},
        {title: "Madalin Cars 2", id: "83424194091e4889899147746eb0639d"},
        {title: "Sniper Clash 3D", id: "d69e4f16599b45629c158580556e438c"},
        {title: "Moto X3M 3D", id: "131713d07e1570776b00511f5d6f194c"},
        {title: "Rebel Forces", id: "f73756d9532d43108f9c158580556e43"},
        {title: "Drift King 3D", id: "d7f1d439b1a044238e8e7a03007f3f1e"},
        {title: "Airport Clash 3D", id: "f2700ca7256149ef9fa67916964259b3"},
        {title: "Subway Runner", id: "f92087640f0c436688755b4869894371"},
        {title: "Zombie Road", id: "b3f07a760f0c436688755b4869894371"},
        {title: "Basketball Stars", id: "f182c12574e44431945116743956485d"},
        {title: "Realistic City Parking", id: "68779956461947e44431955610850244"},
        {title: "Tank Hero 3D", id: "02443965561085024469956461947e44"}
    ];

    const grid = document.getElementById('gameGrid');
    
    // بناء الكروت بروابط تفتح في صفحة جديدة
    games.forEach(g => {
        // الحل السحري: استخدام عنصر a برابط مباشر و target="_blank"
        const card = document.createElement('a');
        card.className = 'game-card';
        // الرابط المباشر للعبة على سيرفر Gamedistribution المفتوح
        card.href = `https://html5.gamedistribution.com/${g.id}/?gdpr-tracking=0&tag=poki`;
        card.target = "_blank"; // يفتح في Tab جديد لضمان التشغيل وأقصى سرعة
        
        card.innerHTML = `
            <div class="badge">ULTRA 3D</div>
            <img src="https://img.gamedistribution.com/${g.id}-512x512.jpeg" loading="lazy">
            <div class="game-info">
                ${g.title}
                <br>
                <span class="play-btn">إلعب الآن 🚀</span>
            </div>
        `;
        grid.appendChild(card);
    });
</script>

</body>
</html>
