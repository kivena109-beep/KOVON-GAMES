<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO 3D GAMES</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --purple: #bc13fe; --bg: #050505; }
        body { background-color: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }
        
        header { background: #000; padding: 25px; text-align: center; border-bottom: 2px solid var(--neon); box-shadow: 0 0 20px rgba(0, 243, 255, 0.3); }
        header h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin: 0; background: linear-gradient(to right, var(--neon), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 30px; max-width: 1300px; margin: 0 auto; }
        
        .game-card { background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #333; cursor: pointer; transition: 0.4s; position: relative; }
        .game-card:hover { transform: translateY(-10px); border-color: var(--neon); box-shadow: 0 0 25px rgba(0, 243, 255, 0.4); }
        .game-card img { width: 100%; height: 150px; object-fit: cover; }
        .game-info { padding: 12px; text-align: center; background: #111; border-top: 1px solid #222; }
        .game-title { font-weight: bold; font-size: 1rem; color: var(--neon); }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; flex-direction: column; }
        .overlay.active { display: flex; }
        .overlay-header { height: 55px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--neon); }
        .close-btn { background: #ff4d4d; color: white; border: none; padding: 7px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; }
        iframe { flex-grow: 1; width: 100%; border: none; background: #000; }
    </style>
</head>
<body>

<header>
    <h1>KIVENIOO 3D HUB</h1>
    <p>عالم الألعاب ثلاثية الأبعاد الاحترافي</p>
</header>

<div class="container">
    
    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/3966099b244d4766be336a11e8f237f8/')">
        <img src="https://img.gamedistribution.com/3966099b244d4766be336a11e8f237f8-512x512.jpeg">
        <div class="game-info"><span class="game-title">Combat Online (3D)</span></div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/83424194091e4889899147746eb0639d/')">
        <img src="https://img.gamedistribution.com/83424194091e4889899147746eb0639d-512x512.jpeg">
        <div class="game-info"><span class="game-title">سيارات مجنونة (3D)</span></div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/f73756d9532d43108f9c158580556e43/')">
        <img src="https://img.gamedistribution.com/f73756d9532d43108f9c158580556e43-512x512.jpeg">
        <div class="game-info"><span class="game-title">قوات المتمردين (3D)</span></div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/974b77f972b9a7c369e9a4d33a696232/')">
        <img src="https://img.gamedistribution.com/974b77f972b9a7c369e9a4d33a696232-512x512.jpeg">
        <div class="game-info"><span class="game-title">تطور الكائنات</span></div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/68779956461947e44431955610850244/')">
        <img src="https://img.gamedistribution.com/68779956461947e44431955610850244-512x512.jpeg">
        <div class="game-info"><span class="game-title">ركن السيارات (واقعي)</span></div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/d69e4f16599b45629c158580556e438c/')">
        <img src="https://img.gamedistribution.com/d69e4f16599b45629c158580556e438c-512x512.jpeg">
        <div class="game-info"><span class="game-title">القناص المحترف (3D)</span></div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/f2700ca7256149ef9fa67916964259b3/')">
        <img src="https://img.gamedistribution.com/f2700ca7256149ef9fa67916964259b3-512x512.jpeg">
        <div class="game-info"><span class="game-title">معركة المطار (3D)</span></div>
    </div>

    <div class="game-card" onclick="openGame('https://html5.gamedistribution.com/131713d07e1570776b00511f5d6f194c/')">
        <img src="https://img.gamedistribution.com/131713d07e1570776b00511f5d6f194c-512x512.jpeg">
        <div class="game-info"><span class="game-title">موتوسيكلات (3D)</span></div>
    </div>

</div>

<div class="overlay" id="overlay">
    <div class="overlay-header">
        <span style="color: var(--neon); font-family: 'Orbitron';">KIVENIOO 3D PLAYING...</span>
        <button class="close-btn" onclick="closeGame()">إغلاق X</button>
    </div>
    <iframe id="gameIframe" src="" allow="autoplay; fullscreen; keyboard"></iframe>
</div>

<script>
    function openGame(url) {
        document.getElementById('overlay').classList.add('active');
        document.getElementById('gameIframe').src = url;
        document.body.style.overflow = 'hidden';
    }

    function closeGame() {
        document.getElementById('overlay').classList.remove('active');
        document.getElementById('gameIframe').src = '';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
