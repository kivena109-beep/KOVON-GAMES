<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO ULTRA HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00ff88; --side: #7000ff; --bg: #050508; --card: #111119; --text: #ffffff; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* تصميم الهيدر الجديد */
        header { 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: 25px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }
        .logo { font-family: 'Orbitron', sans-serif; color: var(--main); font-size: 1.8rem; text-shadow: 0 0 15px var(--main); }

        /* منطقة البحث */
        .search-area { background: rgba(255,255,255,0.05); border: 1px solid var(--main); border-radius: 30px; padding: 5px 20px; }
        .search-area input { background: transparent; border: none; color: #fff; padding: 8px; outline: none; width: 150px; }

        .container { padding: 30px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }

        /* الكروت الجديدة بتصميم مختلف */
        .game-card { 
            background: var(--card); border-radius: 20px; overflow: hidden; 
            border: 2px solid rgba(112, 0, 255, 0.1); transition: 0.4s ease; position: relative;
        }
        .game-card:hover { 
            transform: translateY(-10px); border-color: var(--main); 
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        .game-card img { width: 100%; height: 160px; object-fit: cover; }
        
        .info { padding: 15px; text-align: center; }
        .info h3 { margin: 0 0 15px; font-size: 1.1rem; letter-spacing: 1px; }

        .play-btn { 
            background: linear-gradient(45deg, var(--side), var(--main));
            color: #fff; text-decoration: none; padding: 10px; border-radius: 12px;
            display: block; font-weight: bold; text-transform: uppercase; font-size: 0.9rem;
        }

        /* تمييز ماين كرافت */
        .mc-special { border-color: #4caf50 !important; }
        .mc-special .play-btn { background: #4caf50; color: #000; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            .game-card img { height: 120px; }
            .logo { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">KIVENIOO</div>
    <div class="search-area">
        <input type="text" id="gameSearch" placeholder="ابحث عن لعبتك..." onkeyup="filter()">
    </div>
</header>

<div class="container">
    <div class="grid" id="gameGrid"></div>
</div>

<script>
    const games = [
        // رابط ماين كرافت جديد ومجرب وشغال
        { n: "Minecraft 3D", i: "f92087640f0c436688755b4869894372", l: "https://www.google.com/logos/2010/pacman10-i.html", customUrl: "https://minecraft-classic.en.softonic.com/online-app", isMC: true },
        { n: "Subway Surfers", i: "f92087640f0c436688755b4869894371", l: "https://poki.com/en/g/subway-surfers" },
        { n: "Combat Online", i: "3966099b244d4766be336a11e8f237f8", l: "https://www.miniplay.com/game/combat-online" },
        { n: "Madalin Cars 2", i: "83424194091e4889899147746eb0639d", l: "https://www.miniplay.com/game/madalin-stunt-cars-2" },
        { n: "Among Us", i: "68779956461947e44431955610850245", l: "https://poki.com/en/g/among-us" },
        { n: "Sniper Clash 3D", i: "d69e4f16599b45629c158580556e438c", l: "https://www.miniplay.com/game/sniper-clash-3d" },
        { n: "Moto X3M", i: "131713d07e1570776b00511f5d6f194c", l: "https://poki.com/en/g/moto-x3m" },
        { n: "Drift Hunters", i: "d7f1d439b1a044238e8e7a03007f3f1e", l: "https://www.miniplay.com/game/drift-hunters" }
        // يمكنك إضافة الـ 70 لعبة هنا بنفس النمط
    ];

    function render(data = games) {
        const container = document.getElementById('gameGrid');
        container.innerHTML = data.map(g => `
            <div class="game-card ${g.isMC ? 'mc-special' : ''}">
                <img src="https://img.gamedistribution.com/${g.i}-512x512.jpeg" alt="${g.n}">
                <div class="info">
                    <h3>${g.n}</h3>
                    <a href="${g.customUrl || g.l}" target="_blank" class="play-btn">
                        ${g.isMC ? 'START CRAFTING ⛏️' : 'PLAY NOW 🔥'}
                    </a>
                </div>
            </div>
        `).join('');
    }

    function filter() {
        const val = document.getElementById('gameSearch').value.toLowerCase();
        render(games.filter(g => g.n.toLowerCase().includes(val)));
    }

    render();
</script>
</body>
</html>
