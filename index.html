<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO 3D ULTRA | منصة الألعاب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --purple: #bc13fe; --dark: #000; }
        
        body, html { margin: 0; padding: 0; background: var(--dark); color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; height: 100%; }

        /* حاوية الخلفية الديناميكية (فيديو) */
        .bg-video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden;
        }
        .bg-video {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.3) blur(3px); /* تعتيم وغبش عشان الألعاب تظهر */
        }
        /* طبقة حماية عشان الفيديو ما يمنعش الضغط */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: rgba(0,0,0,0.4);
        }

        header {
            padding: 20px; text-align: center; background: rgba(0,0,0,0.7);
            border-bottom: 2px solid var(--neon); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif; font-size: clamp(1.8rem, 4vw, 2.5rem); margin: 0;
            background: linear-gradient(90deg, var(--neon), var(--purple), var(--neon));
            background-size: 200%; animation: shine 4s linear infinite;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--neon));
        }
        @keyframes shine { to { background-position: 200%; } }

        .container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px; padding: 40px 20px; max-width: 1400px; margin: 0 auto;
            position: relative; z-index: 10;
        }

        /* كارت اللعبة الـ 3D الفخم */
        .game-card {
            background: rgba(255, 255, 255, 0.05); border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(0, 243, 255, 0.15); cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(5px); position: relative;
        }

        .game-card:hover {
            transform: scale(1.08) translateY(-10px); border-color: var(--neon);
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.4);
        }

        /* علامة 3D على الكارت */
        .game-card::after {
            content: '3D'; position: absolute; top: 10px; right: 10px;
            background: linear-gradient(45deg, var(--neon), var(--purple));
            color: #000; font-family: 'Orbitron', sans-serif; font-weight: bold;
            font-size: 0.7rem; padding: 3px 8px; border-radius: 5px;
            box-shadow: 0 0 10px var(--neon); z-index: 5;
        }

        .game-card img {
            width: 100%; height: 150px; object-fit: cover;
            transition: 0.3s; filter: grayscale(20%);
        }
        .game-card:hover img { filter: grayscale(0%); }

        .game-info {
            padding: 15px; text-align: center; font-weight: bold; font-size: 0.95rem;
            background: rgba(0,0,0,0.8); color: #fff;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* واجهة اللعب السينمائية العملاقة */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; flex-direction: column;
        }
        .overlay.active { display: flex; }

        .nav-bar {
            height: 60px; background: #111; display: flex; justify-content: space-between;
            align-items: center; padding: 0 25px; border-bottom: 2px solid var(--purple);
        }

        .close-btn {
            background: linear-gradient(45deg, #ff4757, #ff6b81); color: white;
            border: none; padding: 10px 25px; border-radius: 12px; cursor: pointer;
            font-family: 'Cairo'; font-weight: bold; font-size: 1rem;
            transition: 0.3s; box-shadow: 0 0 15px rgba(255, 71, 87, 0.4);
        }
        .close-btn:hover { transform: scale(1.1); box-shadow: 0 0 25px rgba(255, 71, 87, 0.6); }

        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; background: #000; }

        /* علامة التحميل (النيون) */
        .loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; border: 6px solid #1a1a1a; border-top-color: var(--neon);
            border-radius: 50%; animation: spin 1s infinite linear; z-index: -1;
            box-shadow: 0 0 15px var(--neon);
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        footer { text-align: center; padding: 30px; color: rgba(255,255,255,0.3); font-size: 0.8rem; position: relative; z-index: 10; }

    </style>
</head>
<body>

<div class="bg-video-container">
    <video class="bg-video" autoplay loop muted playsinline>
        <source src="https://status.crazygames.com/b2b/cg-v6.mp4" type="video/mp4">
    </video>
</div>
<div class="bg-overlay"></div>

<header>
    <h1>KIVENIOO 3D ULTRA</h1>
    <p style="color: var(--neon); margin: 5px 0 0; font-size: clamp(0.7rem, 2vw, 0.9rem); letter-spacing: 3px;">PURES 3D GAMING ZONE</p>
</header>

<div class="container" id="gamesGrid">
    </div>

<div class="overlay" id="overlay">
    <div class="nav-bar">
        <span style="color: var(--neon); font-family: 'Orbitron'; font-size: clamp(0.8rem, 2vw, 1rem);">KIVENIOO ELITE PLAYER V4.0</span>
        <button class="close-btn" onclick="closeGame()">العودة X</button>
    </div>
    <div class="loader"></div>
    <iframe id="gameIframe" src="" allowfullscreen allow="autoplay; fullscreen; keyboard"></iframe>
</div>

<footer>
    تم التصميم لـ Kivenioo © 2026 | ألعاب 3D حصرية
</footer>

    const grid = document.getElementById('gamesGrid');
    
    // إنشاء الكروت تلقائياً
    games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.onclick = () => {
            document.getElementById('overlay').classList.add('active');
            // استخدام رابط سريع مباشر لضمان التشغيل في المدرسة
            document.getElementById('gameIframe').src = `https://html5.gamedistribution.com/${game.id}/?gdpr-tracking=0`;
            document.body.style.overflow = 'hidden';
        };
        card.innerHTML = `
            <img src="https://img.gamedistribution.com/${game.id}-512x512.jpeg" loading="lazy" alt="${game.title}">
            <div class="game-info">${game.title}</div>
        `;
        grid.appendChild(card);
    });

    function closeGame() {
        document.getElementById('overlay').classList.remove('active');
        document.getElementById('gameIframe').src = ''; // إيقاف اللعبة والصوت
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
