<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO MEGA HUB V7</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00ff88; --accent: #7000ff; --bg: #08080c; --card: #12121a; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; transition: 0.4s; overflow-x: hidden; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -20%, var(--accent), transparent 40%); z-index: -1; opacity: 0.3; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; color: var(--main); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--main); }

        .search-box { background: var(--card); border: 2px solid var(--main); border-radius: 12px; padding: 5px 15px; display: flex; align-items: center; }
        .search-box input { background: transparent; border: none; color: var(--text); outline: none; width: 120px; font-family: 'Cairo'; }

        .hero { text-align: center; padding: 40px 20px; }
        .hero h2 { font-size: 2rem; margin-bottom: 5px; font-weight: 900; }
        .hero p { opacity: 0.7; font-size: 1rem; color: var(--main); }

        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 0 5% 50px; }

        .card { background: var(--card); border-radius: 15px; overflow: hidden; position: relative; transition: 0.4s; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform: translateY(-10px); border-color: var(--main); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .card img { width: 100%; height: 150px; object-fit: cover; transition: 0.4s; }
        .card-body { padding: 15px; text-align: center; }
        .card-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 12px; display: block; }
        
        .btn-play { background: var(--main); color: #000; padding: 10px 0; border-radius: 8px; display: block; text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
        .btn-play:hover { background: #fff; transform: scale(1.05); }

        .mc-special { border: 2px solid #4caf50 !important; background: rgba(76, 175, 80, 0.05); }
        .mc-special .btn-play { background: #4caf50; color: #fff; }

        @media (max-width: 600px) {
            .game-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
            .card img { height: 110px; }
            .logo { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<nav>
    <div class="logo">KIVENIOO</div>
    <div class="search-box">
        <input type="text" id="search" placeholder="ابحث..." onkeyup="search()">
    </div>
</nav>

<div class="hero">
    <h2>إمبراطورية الألعاب</h2>
    <p>70 لعبة + Minecraft - جاهزة للعب على كل الأجهزة</p>
</div>

<div class="game-grid" id="grid"></div>

<script>
    const games = [
        // ماين كرافت - الرابط الرسمي المباشر
        { n: "Minecraft Classic", i: "f92087640f0c436688755b4869894372", l: "https://classic.minecraft.net", special: true },
        { n: "Subway Surfers", i: "f92087640f0c436688755b4869894371", l: "https://poki.com/en/g/subway-surfers" },
        { n: "Combat Online", i: "3966099b244d4766be336a11e8f237f8", l: "https://www.miniplay.com/game/combat-online" },
        { n: "Madalin Cars 2", i: "83424194091e4889899147746eb0639d", l: "https://www.miniplay.com/game/madalin-stunt-cars-2" },
        { n: "Among Us", i: "68779956461947e44431955610850245", l: "https://poki.com/en/g/among-us" },
        { n: "Sniper Clash 3D", i: "d69e4f16599b45629c158580556e438c", l: "https://www.miniplay.com/game/sniper-clash-3d" },
        { n: "Moto X3M", i: "131713d07e1570776b00511f5d6f194c", l: "https://poki.com/en/g/moto-x3m" },
        { n: "Drift Hunters", i: "d7f1d439b1a044238e8e7a03007f3f1e", l: "https://www.miniplay.com/game/drift-hunters" },
        { n: "Stickman Hook", i: "7c9e5e262a83151f1f9ea40f5cca0096", l: "https://poki.com/en/g/stickman-hook" },
        { n: "Penalty Shooters 2", i: "b3f07a760f0c436688755b4869894371", l: "https://www.miniplay.com/game/penalty-shooters-2" }
        // ... باقي الألعاب تضاف هنا بنفس النمط
    ];

    function render(list = games) {
        const grid = document.getElementById('grid');
        grid.innerHTML = list.map(g => `
            <div class="card ${g.special ? 'mc-special' : ''}">
                <img src="https://img.gamedistribution.com/${g.i}-512x512.jpeg" alt="${g.n}" onerror="this.src='https://via.placeholder.com/512x512/12121a/00ff88?text=${g.n}'">
                <div class="card-body">
                    <span class="card-title">${g.n}</span>
                    <a href="${g.l}" target="_blank" class="btn-play">العب الآن 🔥</a>
                </div>
            </div>`).join('');
    }

    function search() {
        const val = document.getElementById('search').value.toLowerCase();
        render(games.filter(g => g.n.toLowerCase().includes(val)));
    }

    render();
</script>
</body>
</html>
