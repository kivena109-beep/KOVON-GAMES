        .hero { text-align: center; padding: 30px 20px; }
        .hero h2 { font-size: 2.2rem; margin-bottom: 5px; font-weight: 900; }
        .hero p { opacity: 0.8; color: var(--main); font-weight: bold; }

        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 0 5% 50px; }

        .card { background: var(--card); border-radius: 15px; overflow: hidden; position: relative; transition: 0.4s; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform: translateY(-10px); border-color: var(--main); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .card-body { padding: 15px; text-align: center; }
        .card-title { font-size: 0.9rem; font-weight: 900; margin-bottom: 12px; display: block; height: 25px; overflow: hidden; }
        
        .btn-play { background: var(--main); color: #000; padding: 8px 0; border-radius: 8px; display: block; text-decoration: none; font-weight: bold; font-size: 0.85rem; transition: 0.3s; }
        .btn-play:hover { background: #fff; transform: scale(1.05); }

        .featured { border: 2px solid var(--main) !important; box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }
