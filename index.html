<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVENIOO HUB - 3D ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --purple: #bc13fe; --dark: #000000; }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--dark); font-family: 'Cairo', sans-serif; overflow-x: hidden; color: white; scroll-behavior: smooth; }

        /* حاوية الخلفية المتحركة (الفيديو) */
        .video-bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden;
        }
        .video-bg {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.3) contrast(1.1); /* تعتيم وغبش بسيط عشان الألعاب تظهر */
        }
        /* طبقة حماية عشان الفيديو ما يمنعش الضغط */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8));
        }

        header {
            padding: 40px 20px; text-align: center; border-bottom: 3px solid var(--neon);
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif; font-size: clamp(2.2rem, 5vw, 3.5rem); margin: 0;
            background: linear-gradient(90deg, #fff, var(--neon), var(--purple), #fff);
            background-size: 200%; animation: glow 5s linear infinite;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 5px; text-transform: uppercase;
        }

        @keyframes glow { to { background-position: 200%; } }

        /* شريط الفئات الصايع */
        .categories {
            display: flex; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap;
        }
        .cat-tag {
            padding: 6px 18px; border: 1px solid var(--neon); border-radius: 50px;
            font-size: 0.85rem; font-weight: bold; cursor: pointer; transition: 0.3s;
            background: rgba(0, 243, 255, 0.05); color: var(--neon);
        }
        .cat-tag:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }

        .container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px; padding: 50px 20px; max-width: 1400px; margin: 0 auto;
        }

        /* كارت اللعبة بنظام Glassmorphism المتطور */
        .game-card {
            background: rgba(255, 255, 255, 0.03); border-radius: 25px; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none; color: white; display: block; position: relative;
            backdrop-filter: blur(10px);
        }

        .game-card:hover {
            transform: translateY(-15px) scale(1.03);
            border-color: var(--neon);
            box-shadow: 0 20px 40px rgba(0, 243, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .game-card img {
            width: 100%; height: 180px; object-fit: cover;
            border-bottom: 2px solid rgba(255,255,255,0.05);
        }

        .game-info { padding: 20px; text-align: center; }
        .game-info span { font-size: 1.15rem; font-weight: 700; display: block; margin-bottom: 12px; }

        /* زر START GAME المتدرج الصايع */
        .play-btn {
            padding: 10px 30px; background: linear-gradient(45deg, var(--neon), var(--purple));
            color: white; border-radius: 50px; font-size: 0.9rem; font-weight: bold;
            display: inline-block; transition: 0.3s; border: none; text-transform: uppercase;
        }

        .game-card:hover .play-btn { transform: scale(1.15); box-shadow: 0 0 20px var(--neon); }

        footer { text-align: center; padding: 40px; color: rgba(255,255,255,0.2); font-family: 'Orbitron'; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="video-bg-container">
    <video class="video-bg" autoplay loop muted playsinline>
        <source src="https://v.ftcdn.net/05/56/15/45/700_F_556154562_AsLdZtZf1D6CgGv9p0AAmf8m9K0ZpW6m_ST.mp4" type="video/mp4">
    </video>
</div>
<div class="bg-overlay"></div>

<header>
    <h1>KIVENIOO HUB</h1>
    <div class="categories">
        <div class="cat-tag">Multiplayer#</div>
        <div class="cat-tag">3D_Extreme#</div>
        <div class="cat-tag">Racing#</div>
        <div class="cat-tag">Shooter#</div>
    </div>
</header>

<div class="container" id="gameGrid"></div>

<footer>
    ESTABLISHED 2026 // KIVENIOO PRIVATE SERVER
</footer>

<script>
    // قائمة الألعاب المعتمدة بالصور والروابط الشغالة
    const games = [
        {title: "Combat Online", url: "https://www.miniplay.com/embed/combat-online", img: "https://img.gamedistribution.com/3966099b244d4766be336a11e8f237f8-512x512.jpeg"},
        {title: "Madalin Cars 2", url: "https://www.miniplay.com/embed/madalin-stunt-cars-2", img: "https://img.gamedistribution.com/83424194091e4889899147746eb0639d-512x512.jpeg"},
        {title: "Moto X3M 3D", url: "https://www.miniplay.com/embed/moto-x3m-spooky-land", img: "https://img.gamedistribution.com/131713d07e1570776b00511f5d6f194c-512x512.jpeg"},
        {title: "Sniper Clash 3D", url: "https://www.miniplay.com/embed/sniper-clash-3d", img: "https://img.gamedistribution.com/d69e4f16599b45629c158580556e438c-512x512.jpeg"},
        {title: "Shell Shockers", url: "https://www.miniplay.com/embed/shell-shockers", img: "https://img.gamedistribution.com/f73756d9532d43108f9c158580556e43-512x512.jpeg"},
        {title: "Drift Hunters 3D", url: "https://www.miniplay.com/embed/drift-hunters", img: "https://img.gamedistribution.com/d7f1d439b1a044238e8e7a03007f3f1e-512x512.jpeg"},
        {title: "Venge.io", url: "https://www.miniplay.com/embed/venge-io", img: "https://img.gamedistribution.com/f73756d9532d43108f9c158580556e43-512x512.jpeg"},
        {title: "Football Cup", url: "https://www.miniplay.com/embed/football-cup-2021", img: "https://img.gamedistribution.com/c6f663f77b4d13b482270929f6974b-512x512.jpeg"}
    ];

    const grid = document.getElementById('gameGrid');
    
    games.forEach(g => {
        const card = document.createElement('a');
        card.className = 'game-card';
        card.href = g.url;
        card.target = "_blank"; // تفتح في صفحة جديدة عشان تشتغل طقة
        
        card.innerHTML = `
            <img src="${g.img}" alt="${g.title}" loading="lazy">
            <div class="game-info">
                <span>${g.title}</span>
                <div class="play-btn">START GAME ⚡</div>
            </div>
        `;
        grid.appendChild(card);
    });
</script>

</body>
</html>
